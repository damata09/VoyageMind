name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: voyagemind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voyagemind_test

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voyagemind_test

      - name: Type check
        run: npx tsc --noEmit
        env:
          JWT_SECRET: test-secret-minimum-16-chars
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voyagemind_test
          GEMINI_API_KEY: fake-key
          MONGODB_URI: mongodb://localhost:27017/voyagemind_test

      - name: Run tests
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-minimum-16-chars
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/voyagemind_test
          GEMINI_API_KEY: fake-key
          MONGODB_URI: mongodb://localhost:27017/voyagemind_test

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
